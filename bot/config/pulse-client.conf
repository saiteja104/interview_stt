# PulseAudio client configuration
# Tells all processes (Chrome, FFmpeg) where to find the PulseAudio server

# Use Unix socket (faster than TCP, works within container)
default-server = unix:/tmp/pulse/native

# Don't try to start PulseAudio automatically
# Supervisor manages it
autospawn = no

# Don't exit when last client disconnects
daemon-binary = /usr/bin/pulseaudio
